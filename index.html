<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kiyo's Mind ✨</title>
  <link rel="icon" href="favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    /* ── TOKENS ── */
    :root {
      --bg:#fdf6f9; --card:#ffffff; --text:#1a1a2e; --sub:#7a7a9a;
      --accent:#e8739a; --accent2:#b5569a; --border:#f0d4e0;
      --ok:#4caf8a; --err:#e05c6a; --streak:#ff9a3c;
      --r:18px; --r-sm:10px;
      --shadow:0 4px 24px rgba(232,115,154,.10);
    }
    [data-theme="dark"]{
      --bg:#0d0d14; --card:#16161f; --text:#e8e8f0; --sub:#8888aa;
      --accent:#c45c8a; --accent2:#8b3a7a; --border:#2a1f2e;
      --ok:#3a9a72; --err:#c04455; --streak:#e08530;
      --shadow:0 4px 24px rgba(0,0,0,.4);
    }

    /* ── RESET ── */
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .4s,color .4s;overflow-x:hidden;}
    .wrap{max-width:480px;margin:auto;padding:16px 16px 40px;}

    /* ── SCREENS ── */
    .screen{display:none;animation:fadeUp .3s ease;}
    .screen.active{display:block;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

    /* ── CARD ── */
    .card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:20px;box-shadow:var(--shadow);}

    /* ── TOP BAR ── */
    .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;padding:10px 18px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);}
    .topbar-title{font-size:.62rem;font-weight:900;letter-spacing:3px;cursor:pointer;color:var(--accent);}
    .ctrl-row{display:flex;gap:14px;align-items:center;}
    .ctrl-btn{background:none;border:none;cursor:pointer;font-size:.95rem;color:var(--sub);display:flex;flex-direction:column;align-items:center;gap:2px;}
    .ctrl-btn small{font-size:.48rem;font-weight:700;color:var(--sub);}

    /* ── CHIPS ── */
    .chip-row{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0 16px;}
    .chip{padding:8px 16px;border-radius:50px;border:1.5px solid var(--border);background:var(--card);font-size:.78rem;font-weight:600;cursor:pointer;color:var(--sub);transition:all .2s;}
    .chip:hover{border-color:var(--accent);color:var(--accent);}
    .chip.on{background:var(--accent);color:#fff;border-color:var(--accent);}

    /* ── BUTTONS ── */
    .btn{width:100%;padding:16px;border-radius:var(--r);border:none;font-weight:700;font-size:.95rem;cursor:pointer;transition:opacity .2s;letter-spacing:.4px;margin-top:10px;}
    .btn-primary{background:var(--text);color:var(--bg);}
    .btn-outline{background:transparent;color:var(--accent);border:2px solid var(--accent);}
    .btn-ghost{background:transparent;color:var(--sub);border:1.5px solid var(--border);}
    .btn:hover{opacity:.85;}

    /* ── LABEL ── */
    .lbl{font-size:.62rem;font-weight:700;letter-spacing:1.5px;color:var(--sub);text-transform:uppercase;margin-bottom:8px;margin-top:18px;display:block;}

    /* ── PROFILE PICKER ── */
    .profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:20px 0;}
    .profile-card{background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:22px 14px;text-align:center;cursor:pointer;transition:all .25s;}
    .profile-card:hover,.profile-card.active{border-color:var(--accent);box-shadow:0 0 0 4px rgba(232,115,154,.12);}
    .profile-avatar{font-size:2.6rem;margin-bottom:8px;}
    .profile-name{font-weight:700;font-size:.95rem;}
    .profile-streak{font-size:.72rem;color:var(--streak);font-weight:600;margin-top:4px;}
    .profile-acc{font-size:.68rem;color:var(--sub);margin-top:2px;}

    /* ── HOME ── */
    .welcome-banner{text-align:center;padding:28px 20px 20px;}
    .welcome-banner h1{font-size:1.9rem;font-weight:900;}
    .welcome-banner p{color:var(--sub);font-size:.85rem;margin-top:6px;}
    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0;}
    .stat-box{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:14px 8px;text-align:center;}
    .stat-val{font-size:1.4rem;font-weight:900;color:var(--accent);}
    .stat-val.streak-val{color:var(--streak);}
    .stat-lbl{font-size:.6rem;color:var(--sub);font-weight:600;margin-top:2px;text-transform:uppercase;letter-spacing:.8px;}
    .streak-fire{font-size:1.1rem;}

    /* ── STREAK CALENDAR ── */
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin:10px 0;}
    .cal-day{aspect-ratio:1;border-radius:6px;background:var(--border);opacity:.4;}
    .cal-day.done{background:var(--streak);opacity:1;}
    .cal-day.today{outline:2px solid var(--accent);outline-offset:2px;opacity:1;}

    /* ── GAME SCREEN ── */
    .q-card{text-align:center;padding:36px 20px 24px;position:relative;margin-bottom:18px;}
    .q-counter{position:absolute;top:14px;right:16px;font-size:.78rem;font-weight:700;color:var(--sub);}
    .q-timer{position:absolute;top:14px;left:16px;font-size:.82rem;font-weight:900;color:var(--accent);}
    .q-pause{position:absolute;top:10px;right:52px;background:none;border:none;cursor:pointer;font-size:1rem;color:var(--sub);}
    .q-meta{font-size:.75rem;font-weight:600;color:var(--accent);margin-bottom:8px;}
    .q-main{font-size:2.2rem;font-weight:900;font-family:'Noto Serif JP',serif;line-height:1.3;}
    .q-main rt{font-size:.55rem;font-weight:400;}
    .q-tag{display:inline-block;margin-top:14px;background:var(--text);color:var(--bg);padding:5px 14px;border-radius:50px;font-size:.72rem;font-weight:700;}
    .q-hint{display:inline-block;margin-top:8px;background:rgba(232,115,154,.12);color:var(--accent);padding:4px 12px;border-radius:50px;font-size:.68rem;font-weight:600;}

    .opt-btn{width:100%;padding:16px 18px;background:var(--card);border:2px solid var(--border);border-radius:var(--r-sm);margin-bottom:10px;cursor:pointer;color:var(--text);font-weight:600;font-size:1rem;transition:all .18s;text-align:left;}
    .opt-btn:hover{border-color:var(--accent);color:var(--accent);}
    .opt-btn.correct{border-color:var(--ok);background:rgba(76,175,138,.1);color:var(--ok);}
    .opt-btn.wrong{border-color:var(--err);background:rgba(224,92,106,.1);color:var(--err);}

    /* ── STAR QUESTION ── */
    .star-sentence{background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:22px;text-align:center;font-size:1.2rem;font-weight:600;margin-bottom:18px;line-height:1.8;}
    .star-sentence .blank{display:inline-block;min-width:60px;border-bottom:3px solid var(--accent);margin:0 4px;color:var(--accent);}

    /* progress bar */
    .prog-bar{width:100%;height:4px;background:var(--border);border-radius:4px;margin-bottom:18px;overflow:hidden;}
    .prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width .4s;}

    /* ── RESULT ── */
    .result-ring{width:110px;height:110px;border-radius:50%;border:6px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:1.8rem;font-weight:900;}
    .result-ring.great{border-color:var(--ok);}
    .result-ring.ok{border-color:var(--streak);}
    .result-ring.bad{border-color:var(--err);}

    /* ── LIBRARY ── */
    .table-wrap{overflow-x:auto;border-radius:var(--r-sm);border:1.5px solid var(--border);margin-top:14px;max-height:55vh;}
    table{width:100%;border-collapse:collapse;min-width:860px;}
    .grammar-mode table{min-width:100%;}
    th{background:var(--accent);color:#fff;padding:10px 12px;font-size:.65rem;position:sticky;top:0;z-index:5;font-weight:700;letter-spacing:.5px;}
    td{padding:10px 12px;border-bottom:1px solid var(--border);background:var(--card);font-size:.75rem;text-align:center;}

    /* ── PAUSE ── */
    #pause-screen{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);z-index:9000;display:none;justify-content:center;align-items:center;}
    #pause-screen.show{display:flex;}

    /* ── FEEDBACK TOAST ── */
    #toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:14px 28px;font-weight:700;font-size:.9rem;z-index:8000;opacity:0;transition:all .25s;pointer-events:none;text-align:center;min-width:200px;box-shadow:var(--shadow);}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    #toast.t-ok{border-color:var(--ok);color:var(--ok);}
    #toast.t-err{border-color:var(--err);color:var(--err);}

    /* misc */
    hr{border:none;border-top:1.5px solid var(--border);margin:18px 0;}
    .text-center{text-align:center;}
    .mt{margin-top:10px;}
    .accent{color:var(--accent);}
    .sub{color:var(--sub);}
    .bold{font-weight:700;}
    .small{font-size:.78rem;}

    /* ── VERB HINT CARD ── */
    .verb-hint{margin-bottom:14px;padding:12px 16px;background:rgba(232,115,154,.07);border-left:3px solid var(--accent);border-radius:0 var(--r-sm) var(--r-sm) 0;font-size:.78rem;}
    .verb-hint strong{color:var(--accent);}
  </style>
</head>
<body data-theme="light">

<!-- AUDIO -->
<audio id="bgm-light" loop src="https://files.catbox.moe/g6p5mx.mp3"></audio>
<audio id="bgm-dark"  loop src="https://files.catbox.moe/2ti16m.mp3"></audio>
<audio id="sfx-ok"   src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3" preload="auto"></audio>
<audio id="sfx-err"  src="https://files.catbox.moe/mk59ob.mp3" preload="auto"></audio>

<!-- PAUSE OVERLAY -->
<div id="pause-screen">
  <div class="card" style="width:260px;text-align:center;padding:30px;">
    <div style="font-size:1.4rem;font-weight:900;margin-bottom:6px;">一時停止</div>
    <div class="sub small" style="margin-bottom:20px;">セッション中...</div>
    <button class="btn btn-primary" onclick="togglePause(false)">再開 ▶</button>
    <button class="btn btn-ghost"   onclick="togglePause(false);navTo('home-screen')">終了</button>
  </div>
</div>

<!-- FEEDBACK TOAST -->
<div id="toast"></div>

<div class="wrap">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="ctrl-row">
      <button class="ctrl-btn" onclick="toggleBgm()">🎵<small id="lbl-bgm">OFF</small></button>
      <button class="ctrl-btn" onclick="toggleSfx()">🔊<small id="lbl-sfx">ON</small></button>
    </div>
    <span class="topbar-title" onclick="navTo('home-screen')">KIYO'S MIND</span>
    <button class="ctrl-btn" onclick="toggleTheme()" style="font-size:1.1rem;">🌓<small>テーマ</small></button>
  </div>

  <!-- ══════════════════════════════
       SCREEN: PROFILE PICKER
  ══════════════════════════════ -->
  <div id="profile-screen" class="screen active">
    <div style="text-align:center;padding:30px 0 10px;">
      <div style="font-size:2rem;font-weight:900;">こんにちは！</div>
      <div class="sub small" style="margin-top:6px;">誰が練習しますか？</div>
    </div>
    <div class="profile-grid" id="profile-grid"></div>
    <button class="btn btn-ghost" onclick="showAddProfile()" style="margin-top:4px;">＋ プロフィール追加</button>
    <div id="add-profile-form" style="display:none;margin-top:16px;" class="card">
      <span class="lbl">名前</span>
      <input id="new-profile-name" type="text" placeholder="名前を入力..." maxlength="12"
        style="width:100%;padding:12px;border:1.5px solid var(--border);border-radius:var(--r-sm);background:var(--bg);color:var(--text);font-size:.95rem;margin-bottom:12px;">
      <span class="lbl">アバター</span>
      <div class="chip-row" id="avatar-picker">
        <span class="chip on" data-av="🌸">🌸</span>
        <span class="chip" data-av="🍵">🍵</span>
        <span class="chip" data-av="⛩️">⛩️</span>
        <span class="chip" data-av="🎴">🎴</span>
        <span class="chip" data-av="🦊">🦊</span>
        <span class="chip" data-av="🐉">🐉</span>
        <span class="chip" data-av="🌙">🌙</span>
        <span class="chip" data-av="✨">✨</span>
      </div>
      <button class="btn btn-primary" onclick="createProfile()">作成</button>
    </div>
  </div>

  <!-- ══════════════════════════════
       SCREEN: HOME
  ══════════════════════════════ -->
  <div id="home-screen" class="screen">
    <div class="welcome-banner">
      <div id="home-avatar" style="font-size:2.8rem;"></div>
      <h1 id="home-greeting">おかえり！</h1>
      <p id="home-sub" class="sub"></p>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-val streak-val"><span class="streak-fire">🔥</span><span id="stat-streak">0</span></div>
        <div class="stat-lbl">連続日数</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="stat-acc">—</div>
        <div class="stat-lbl">正解率</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="stat-total">0</div>
        <div class="stat-lbl">総問題数</div>
      </div>
    </div>

    <!-- Streak calendar (last 14 days) -->
    <span class="lbl">最近14日間</span>
    <div class="cal-grid" id="cal-grid"></div>

    <hr>
    <span class="lbl">レベル</span>
    <div class="chip-row" id="level-chips">
      <span class="chip on" onclick="setLevel('N4',this)">N4</span>
      <span class="chip"    onclick="setLevel('N3',this)">N3</span>
      <span class="chip"    onclick="setLevel('N2',this)">N2</span>
      <span class="chip"    onclick="setLevel('N1',this)">N1</span>
    </div>

    <span class="lbl">カテゴリー</span>
    <div class="chip-row">
      <span class="chip on" id="cat-V" onclick="setCat('V')">動詞 (Verbos)</span>
      <span class="chip"    id="cat-G" onclick="setCat('G')">文法 (Gramática)</span>
      <span class="chip"    id="cat-S" onclick="setCat('S')">⭐ 星問題</span>
    </div>

    <button class="btn btn-primary" onclick="navTo('setup-screen')">スタート →</button>
    <button class="btn btn-outline"  onclick="navTo('lib-screen')">ライブラリ 📚</button>
    <button class="btn btn-ghost"    onclick="navTo('profile-screen')">← プロフィール切替</button>
  </div>

  <!-- ══════════════════════════════
       SCREEN: SETUP
  ══════════════════════════════ -->
  <div id="setup-screen" class="screen">
    <div style="font-size:1.3rem;font-weight:900;margin-bottom:4px;">設定</div>
    <div class="sub small" style="margin-bottom:20px;">セッションをカスタマイズ</div>

    <span class="lbl">モード</span>
    <div class="chip-row">
      <span class="chip on" id="m-all"   onclick="setMode('all')">全問</span>
      <span class="chip"    id="m-speed" onclick="setMode('speed')">タイムアタック ⏱</span>
    </div>

    <div id="speed-opts" style="display:none;">
      <span class="lbl">問題数</span>
      <div class="chip-row" id="qty-chips">
        <span class="chip on" onclick="setQty(20,this)">20</span>
        <span class="chip"    onclick="setQty(50,this)">50</span>
        <span class="chip"    onclick="setQty(100,this)">100</span>
        <span class="chip"    onclick="setQty(200,this)">200</span>
      </div>
    </div>

    <span class="lbl">ヒント表示</span>
    <div class="chip-row">
      <span class="chip on" id="h-on"  onclick="setHint(true)">ON（おすすめ）</span>
      <span class="chip"    id="h-off" onclick="setHint(false)">OFF</span>
    </div>

    <button class="btn btn-primary" onclick="startSession()">はじめる ✨</button>
    <button class="btn btn-ghost"   onclick="navTo('home-screen')">← 戻る</button>
  </div>

  <!-- ══════════════════════════════
       SCREEN: GAME
  ══════════════════════════════ -->
  <div id="game-screen" class="screen">
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="card q-card" id="q-card">
      <span class="q-timer" id="q-timer" style="display:none;">0s</span>
      <span class="q-counter" id="q-counter">1 / ?</span>
      <button class="q-pause" onclick="togglePause(true)">✕</button>
      <div class="q-meta" id="q-meta"></div>
      <ruby class="q-main" id="q-main"><rt></rt></ruby>
      <div class="q-tag" id="q-tag"></div>
      <div class="q-hint" id="q-hint" style="display:none;"></div>
    </div>
    <div id="opts-area"></div>
  </div>

  <!-- ══════════════════════════════
       SCREEN: RESULT
  ══════════════════════════════ -->
  <div id="result-screen" class="screen">
    <div class="card text-center" style="padding:40px 20px;">
      <div class="result-ring" id="result-ring">—</div>
      <div style="font-size:1.5rem;font-weight:900;margin-bottom:6px;" id="result-label">終了！</div>
      <div class="sub small" id="result-sub"></div>
      <hr>
      <div style="font-size:2rem;font-weight:900;color:var(--accent);margin:10px 0;" id="result-score"></div>
      <div class="sub small" id="result-time" style="display:none;margin-bottom:6px;"></div>
      <div class="sub small" id="result-acc"></div>
      <button class="btn btn-primary" onclick="navTo('home-screen')" style="margin-top:20px;">ホームに戻る</button>
      <button class="btn btn-outline"  onclick="startSession()">もう一度 🔄</button>
    </div>
  </div>

  <!-- ══════════════════════════════
       SCREEN: LIBRARY
  ══════════════════════════════ -->
  <div id="lib-screen" class="screen">
    <div style="font-size:1.3rem;font-weight:900;margin-bottom:4px;">ライブラリ 📚</div>
    <div class="sub small" style="margin-bottom:14px;">学習した内容を確認</div>
    <div class="chip-row">
      <span class="chip on" id="lib-V" onclick="switchLib('V')">動詞</span>
      <span class="chip"    id="lib-G" onclick="switchLib('G')">文法</span>
    </div>
    <div id="lib-table-wrap" class="table-wrap"><table id="lib-table"></table></div>
    <button class="btn btn-ghost" onclick="navTo('home-screen')" style="margin-top:16px;">← 戻る</button>
  </div>

</div><!-- /wrap -->

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
